<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'none';">
<title>txtkit</title>
<script>
  try {
    if (localStorage.getItem('txtkit-theme') !== 'light')
      document.documentElement.setAttribute('data-theme','dark');
  } catch(e) {
    document.documentElement.setAttribute('data-theme','dark');
  }
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

<div id="site-header"></div>

<p class="intro">Something for messing around with text</p>

<div id="tool-cards" class="tool-list"></div>

<p class="foot-note">built to be boring</p>

</div>
<script src="shared_fn.js"></script>
</body>
</html>
