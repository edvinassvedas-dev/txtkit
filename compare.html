<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'none';">
<title>compare &mdash; txtkit</title>
<script>
  try {
    if (localStorage.getItem('txtkit-theme') !== 'light')
      document.documentElement.setAttribute('data-theme','dark');
  } catch(e) {
    document.documentElement.setAttribute('data-theme','dark');
  }
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

<div id="site-header"></div>

<div class="grid">
  <div class="box">
    <div class="box-head"><span class="label">List A</span><span class="count" id="aCount">0 items</span></div>
    <textarea id="inputA" placeholder="paste first list"></textarea>
    <div class="box-foot"><button id="clearA">Clear</button></div>
  </div>
  <div class="box">
    <div class="box-head"><span class="label">List B</span><span class="count" id="bCount">0 items</span></div>
    <textarea id="inputB" placeholder="paste second list"></textarea>
    <div class="box-foot"><button id="clearB">Clear</button></div>
  </div>
</div>

<div class="grid grid-3">
  <div class="box box-sm">
    <div class="box-head"><span class="label">A only</span><span class="count" id="aOnlyCount">0 items</span></div>
    <textarea id="aOnly" readonly placeholder="in A but not B"></textarea>
    <div class="box-foot"><button class="primary" id="copyA">Copy</button></div>
  </div>
  <div class="box box-sm">
    <div class="box-head"><span class="label">In both</span><span class="count" id="bothCount">0 items</span></div>
    <textarea id="both" readonly placeholder="in A and B"></textarea>
    <div class="box-foot"><button class="primary" id="copyBoth">Copy</button></div>
  </div>
  <div class="box box-sm">
    <div class="box-head"><span class="label">B only</span><span class="count" id="bOnlyCount">0 items</span></div>
    <textarea id="bOnly" readonly placeholder="in B but not A"></textarea>
    <div class="box-foot"><button class="primary" id="copyB">Copy</button></div>
  </div>
</div>

<div class="options">
  <div class="opt-head"><span>Options</span><button id="resetBtn">Reset</button></div>
  <div class="opt-grid">

    <div class="opt-cell">
      <span class="opt-label">Input separator <span class="hint">applies to both lists</span></span>
      <div class="sep-row">
        <select id="inSepKind">
          <option value="newline" selected>newline</option>
          <option value="comma">comma</option>
          <option value="comma-space">, (with space)</option>
          <option value="semicolon">semicolon</option>
          <option value="space">whitespace</option>
          <option value="tab">tab</option>
          <option value="pipe">pipe |</option>
          <option value="custom">custom</option>
          <option value="regex" title="complex patterns may freeze the tab">regex</option>
        </select>
        <input type="text" id="inSepCustom" placeholder="custom or /regex/" disabled>
      </div>
    </div>

    <div class="opt-cell">
      <span class="opt-label">Output separator <span class="hint">used in all three result boxes</span></span>
      <div class="sep-row">
        <select id="outSepKind">
          <option value="newline" selected>newline</option>
          <option value="comma">comma</option>
          <option value="comma-space">, (with space)</option>
          <option value="semicolon">semicolon</option>
          <option value="space">space</option>
          <option value="tab">tab</option>
          <option value="pipe">pipe |</option>
          <option value="custom">custom</option>
        </select>
        <input type="text" id="outSepCustom" placeholder="custom" disabled>
      </div>
    </div>

    <div class="opt-cell full">
      <span class="opt-label">Behaviour</span>
      <div class="checks">
        <label class="check">
          <input type="checkbox" id="caseSensitive" checked>
          <span>Case sensitive<small>"Apple" and "apple" are different items</small></span>
        </label>
        <label class="check">
          <input type="checkbox" id="trimItems" checked>
          <span>Trim whitespace<small>strip spaces around each item before comparing</small></span>
        </label>
        <label class="check">
          <input type="checkbox" id="dedupe" checked>
          <span>Deduplicate results<small>each item appears at most once in each output box</small></span>
        </label>
      </div>
    </div>

  </div>
</div>

</div>

<script src="shared_fn.js"></script>
<script>
(function(){
  const $ = id => document.getElementById(id);
  const inputA = $('inputA'), inputB = $('inputB');
  const aOnly = $('aOnly'), bOnly = $('bOnly'), both = $('both');
  const inSepKind = $('inSepKind'), inSepCustom = $('inSepCustom');
  const outSepKind = $('outSepKind'), outSepCustom = $('outSepCustom');
  const caseSensitive = $('caseSensitive'), trimItems = $('trimItems'), dedupe = $('dedupe');

  setupCopyButton($('copyA'), aOnly);
  setupCopyButton($('copyB'), bOnly);
  setupCopyButton($('copyBoth'), both);

  // ---- URL hash state (configuration only) ----
  function syncHash() {
    writeHashParams({
      is: inSepKind.value !== 'newline' ? inSepKind.value  : '',
      ic: inSepCustom.value || '',
      os: outSepKind.value !== 'newline' ? outSepKind.value : '',
      oc: outSepCustom.value || '',
      cs: caseSensitive.checked ? '' : '0',
      t:  trimItems.checked     ? '' : '0',
      d:  dedupe.checked        ? '' : '0',
    });
  }
  function loadHash() {
    const p = readHashParams();
    if (p.has('is')) inSepKind.value = p.get('is');
    if (p.has('ic')) inSepCustom.value = p.get('ic');
    if (p.has('os')) outSepKind.value = p.get('os');
    if (p.has('oc')) outSepCustom.value = p.get('oc');
    if (p.get('cs') === '0') caseSensitive.checked = false;
    if (p.get('t')  === '0') trimItems.checked = false;
    if (p.get('d')  === '0') dedupe.checked = false;
    syncSeparatorDisabled(inSepKind, inSepCustom, true);
    syncSeparatorDisabled(outSepKind, outSepCustom, false);
  }
  const debouncedSync   = makeDebounced(syncHash);
  const debouncedUpdate = makeDebounced(update, 150);

  function update(){
    const rawA = splitItems(inputA.value, inSepKind.value, inSepCustom.value);
    const rawB = splitItems(inputB.value, inSepKind.value, inSepCustom.value);

    // trim (if selected) + always drop empty before comparing
    const opts = { trim: trimItems.checked, skipEmpty: true };
    const A = processList(rawA, opts);
    const B = processList(rawB, opts);

    // comparison key
    const key = s => caseSensitive.checked ? s : s.toLowerCase();
    const setA = new Set(A.map(key));
    const setB = new Set(B.map(key));

    let aOnlyArr = A.filter(x => !setB.has(key(x)));
    let bOnlyArr = B.filter(x => !setA.has(key(x)));
    let bothArr  = A.filter(x =>  setB.has(key(x)));

    if (dedupe.checked) {
      const dedup = arr => {
        const seen = new Set();
        return arr.filter(x => {
          const k = key(x);
          if (seen.has(k)) return false;
          seen.add(k); return true;
        });
      };
      aOnlyArr = dedup(aOnlyArr);
      bOnlyArr = dedup(bOnlyArr);
      bothArr  = dedup(bothArr);
    }

    aOnly.value = joinItems(aOnlyArr, outSepKind.value, outSepCustom.value);
    bOnly.value = joinItems(bOnlyArr, outSepKind.value, outSepCustom.value);
    both.value  = joinItems(bothArr,  outSepKind.value, outSepCustom.value);

    $('aCount').textContent = pluralLabel(inputA.value.length ? rawA.length : 0);
    $('bCount').textContent = pluralLabel(inputB.value.length ? rawB.length : 0);
    $('aOnlyCount').textContent = pluralLabel(aOnlyArr.length);
    $('bOnlyCount').textContent = pluralLabel(bOnlyArr.length);
    $('bothCount').textContent  = pluralLabel(bothArr.length);
  }

  ['input','change'].forEach(ev => {
    [inputA, inputB].forEach(el => el.addEventListener(ev, () => { debouncedUpdate(); debouncedSync(); }));
    [inSepCustom, outSepCustom].forEach(el => el.addEventListener(ev, () => { update(); debouncedSync(); }));
    [caseSensitive, trimItems, dedupe, inSepKind, outSepKind].forEach(el => el.addEventListener(ev, () => {
      syncSeparatorDisabled(inSepKind, inSepCustom, true);
      syncSeparatorDisabled(outSepKind, outSepCustom, false);
      update();
      debouncedSync();
    }));
  });

  $('clearA').addEventListener('click', () => { inputA.value = ''; update(); inputA.focus(); });
  $('clearB').addEventListener('click', () => { inputB.value = ''; update(); inputB.focus(); });
  $('resetBtn').addEventListener('click', () => {
    caseSensitive.checked = true; trimItems.checked = true; dedupe.checked = true;
    inSepKind.value = 'newline'; outSepKind.value = 'newline';
    inSepCustom.value = ''; outSepCustom.value = '';
    inSepCustom.disabled = true; outSepCustom.disabled = true;
    update();
    syncHash();
  });

  loadHash();
  update();
})();
</script>
</body>
</html>
