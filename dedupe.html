<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'none';">
<title>dedupe &mdash; txtkit</title>
<script>
  try {
    if (localStorage.getItem('txtkit-theme') !== 'light')
      document.documentElement.setAttribute('data-theme','dark');
  } catch(e) {
    document.documentElement.setAttribute('data-theme','dark');
  }
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

<div id="site-header"></div>

<div class="grid grid-3">
  <div class="box">
    <div class="box-head"><span class="label">Input</span><span class="count" id="inCount">0 items</span></div>
    <textarea id="input" placeholder="paste list here"></textarea>
    <div class="box-foot"><button id="clearIn">Clear</button></div>
  </div>
  <div class="box">
    <div class="box-head"><span class="label">Duplicates</span><span class="count" id="dupCount">0 items</span></div>
    <textarea id="duplicates" readonly placeholder="items that appear more than once"></textarea>
    <div class="box-foot"><button class="primary" id="copyDup">Copy</button></div>
  </div>
  <div class="box">
    <div class="box-head"><span class="label">Unique</span><span class="count" id="uniqCount">0 items</span></div>
    <textarea id="unique" readonly placeholder="deduplicated list (each item once)"></textarea>
    <div class="box-foot"><button class="primary" id="copyUniq">Copy</button></div>
  </div>
</div>

<div class="options">
  <div class="opt-head"><span>Options</span><button id="resetBtn">Reset</button></div>
  <div class="opt-grid">

    <div class="opt-cell">
      <span class="opt-label">Input separator <span class="hint">how items are split</span></span>
      <div class="sep-row">
        <select id="inSepKind">
          <option value="newline" selected>newline</option>
          <option value="comma">comma</option>
          <option value="comma-space">, (with space)</option>
          <option value="semicolon">semicolon</option>
          <option value="space">whitespace</option>
          <option value="tab">tab</option>
          <option value="pipe">pipe |</option>
          <option value="custom">custom</option>
          <option value="regex" title="complex patterns may freeze the tab">regex</option>
        </select>
        <input type="text" id="inSepCustom" placeholder="custom or /regex/" disabled>
      </div>
    </div>

    <div class="opt-cell">
      <span class="opt-label">Output separator <span class="hint">used in both result boxes</span></span>
      <div class="sep-row">
        <select id="outSepKind">
          <option value="newline" selected>newline</option>
          <option value="comma">comma</option>
          <option value="comma-space">, (with space)</option>
          <option value="semicolon">semicolon</option>
          <option value="space">space</option>
          <option value="tab">tab</option>
          <option value="pipe">pipe |</option>
          <option value="custom">custom</option>
        </select>
        <input type="text" id="outSepCustom" placeholder="custom" disabled>
      </div>
    </div>

    <div class="opt-cell full">
      <span class="opt-label">Behaviour</span>
      <div class="checks">
        <label class="check">
          <input type="checkbox" id="caseSensitive" checked>
          <span>Case sensitive<small>"Apple" and "apple" are different items</small></span>
        </label>
        <label class="check">
          <input type="checkbox" id="trimItems" checked>
          <span>Trim whitespace<small>strip spaces around each item before comparing</small></span>
        </label>
        <label class="check">
          <input type="checkbox" id="showCounts">
          <span>Show counts on duplicates<small>append "(N)" to each duplicate label</small></span>
        </label>
      </div>
    </div>

  </div>
</div>

</div>

<script src="shared_fn.js"></script>
<script>
(function(){
  const $ = id => document.getElementById(id);
  const input = $('input'), duplicates = $('duplicates'), unique = $('unique');
  const caseSensitive = $('caseSensitive'), trimItems = $('trimItems'), showCounts = $('showCounts');
  const inSepKind = $('inSepKind'), inSepCustom = $('inSepCustom');
  const outSepKind = $('outSepKind'), outSepCustom = $('outSepCustom');
  const inCount = $('inCount'), dupCount = $('dupCount'), uniqCount = $('uniqCount');

  setupCopyButton($('copyDup'),  duplicates);
  setupCopyButton($('copyUniq'), unique);

  // ---- URL hash state config ----
  function syncHash() {
    writeHashParams({
      is: inSepKind.value !== 'newline'  ? inSepKind.value  : '',
      ic: inSepCustom.value || '',
      os: outSepKind.value !== 'newline' ? outSepKind.value : '',
      oc: outSepCustom.value || '',
      cs: caseSensitive.checked ? '' : '0',
      t:  trimItems.checked     ? '' : '0',
      sc: showCounts.checked    ? '1' : '',
    });
  }
  function loadHash() {
    const p = readHashParams();
    if (p.has('is')) inSepKind.value  = p.get('is');
    if (p.has('ic')) inSepCustom.value = p.get('ic');
    if (p.has('os')) outSepKind.value = p.get('os');
    if (p.has('oc')) outSepCustom.value = p.get('oc');
    if (p.get('cs') === '0') caseSensitive.checked = false;
    if (p.get('t')  === '0') trimItems.checked = false;
    if (p.get('sc') === '1') showCounts.checked = true;
    syncSeparatorDisabled(inSepKind, inSepCustom, true);
    syncSeparatorDisabled(outSepKind, outSepCustom, false);
  }
  const debouncedSync   = makeDebounced(syncHash);
  const debouncedUpdate = makeDebounced(update, 150);

  function update(){
    const raw = splitItems(input.value, inSepKind.value, inSepCustom.value);
    const items = processList(raw, { trim: trimItems.checked, skipEmpty: true });

    // count occurrences using the chosen comparison key, but preserve original casing
    // for display by keeping the first-seen form of each key
    const key = s => caseSensitive.checked ? s : s.toLowerCase();
    const counts = new Map();   // key -> count
    const display = new Map();  // key -> first-seen display value
    for (const item of items) {
      const k = key(item);
      counts.set(k, (counts.get(k) || 0) + 1);
      if (!display.has(k)) display.set(k, item);
    }

    // unique = each distinct item once, in order of first appearance
    const uniqueList = Array.from(display.values());

    // duplicates = items whose count > 1, in order of first appearance
    const dupList = uniqueList
      .filter(item => counts.get(key(item)) > 1)
      .map(item => showCounts.checked ? item + ' (' + counts.get(key(item)) + ')' : item);

    duplicates.value = joinItems(dupList,    outSepKind.value, outSepCustom.value);
    unique.value     = joinItems(uniqueList, outSepKind.value, outSepCustom.value);

    inCount.textContent   = pluralLabel(input.value.length ? raw.length : 0);
    dupCount.textContent  = pluralLabel(dupList.length);
    uniqCount.textContent = pluralLabel(uniqueList.length);
  }

  ['input','change'].forEach(ev => {
    input.addEventListener(ev, () => { debouncedUpdate(); debouncedSync(); });
    [inSepCustom, outSepCustom].forEach(el => el.addEventListener(ev, () => { update(); debouncedSync(); }));
    [caseSensitive, trimItems, showCounts, inSepKind, outSepKind].forEach(el => el.addEventListener(ev, () => {
      syncSeparatorDisabled(inSepKind, inSepCustom, true);
      syncSeparatorDisabled(outSepKind, outSepCustom, false);
      update();
      debouncedSync();
    }));
  });

  $('clearIn').addEventListener('click', () => { input.value = ''; update(); input.focus(); });
  $('resetBtn').addEventListener('click', () => {
    caseSensitive.checked = true; trimItems.checked = true; showCounts.checked = false;
    inSepKind.value = 'newline'; outSepKind.value = 'newline';
    inSepCustom.value = ''; outSepCustom.value = '';
    inSepCustom.disabled = true; outSepCustom.disabled = true;
    update();
    syncHash();
  });

  loadHash();
  update();
})();
</script>
</body>
</html>
